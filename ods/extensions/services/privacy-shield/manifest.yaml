schema_version: ods.services.v1

compatibility:
  ods_min: "2.0.0"

service:
  id: privacy-shield
  name: Privacy Shield (PII Protection)
  aliases: []
  container_name: ods-privacy-shield
  host_env: PRIVACY_SHIELD_HOST
  default_host: privacy-shield
  port: 8085
  external_port_env: SHIELD_PORT
  external_port_default: 8085
  health: /health
  ui_path: /docs
  type: docker
  gpu_backends: [all]
  compose_file: compose.yaml
  category: optional
  depends_on: [llama-server]
  llm:
    consumes: true
    route: direct
    switchboard_exempt: true
    switchboard_exempt_reason: "Inline PII-scrubbing proxy that sits in front of the LLM; it terminates the OpenAI request, scrubs, and forwards. It is a gateway-peer, not a stable-alias client, so it addresses the backend directly rather than ods/current."
    pinning: none
    min_context: 0
    probe:
      kind: completion
      path: /v1/chat/completions
      auth: env:SHIELD_API_KEY
